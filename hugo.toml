baseURL = "https://thomasvd.dev/"
languageCode = "en-us"
title = "thomasvd.dev"
theme = "PaperMod"
summaryLength = 0
enableRobotsTXT = true
googleAnalytics = "G-FT1MZRFHXW"

[params]
  # Environment and metadata
  env = "production"
  author = "Thomas van Dongen"
  title = "Thomas van Dongen — Head of AI Engineering"
  description = "Building production ML systems for embeddings, retrieval, and language models. Head of AI Engineering at Springer Nature. Co-founder of Minish, an open-source ML lab."
  keywords = [
    "Thomas van Dongen",
    "Pringled",
    "machine learning engineer",
    "embeddings",
    "retrieval",
    "recommendation systems",
    "open-source",
    "Model2Vec",
    "SemHash",
    "Semble",
    "Pyversity"
  ]

  # OpenGraph / Social sharing
  images = ["/avatar.png"]
  social.twitter = "thomas_v_dongen"

  # Theme behavior
  defaultTheme = "light"
  disableThemeToggle = true
  disableSpecial1stPost = true
  ShowShareButtons = false
  ShowBreadCrumbs = false
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowReadingTime = false
  ShowRssButtonInSectionTermList = true
  ShowToc = false
  math = true
  hideSummary = false

  # Social icons (header / profile)
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/Pringled"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/thomas-van-dongen"

  [[params.socialIcons]]
    name = "x"
    url = "https://x.com/thomas_v_dongen"

  [[params.socialIcons]]
    name = "googlescholar"
    url = "https://scholar.google.com/citations?user=2Yc0IXMAAAAJ"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:thomasvdongen@proton.me"

  # Homepage: Profile mode
  [params.profileMode]
    enabled = true
    title = "Thomas van Dongen"
    subtitle = "Building production ML systems for embeddings, retrieval, and language models"
    credentials = "Head of AI Engineering at Springer Nature. Co-founder of Minish, an open-source ML lab."
    imageUrl = "/avatar.jpg"
    imageTitle = "Thomas van Dongen"
    imageWidth = 120
    imageHeight = 120

    [[params.profileMode.buttons]]
      name = "Explore projects"
      url = "/projects/"

    [[params.profileMode.buttons]]
      name = "About me"
      url = "/about/"

  # Assets / highlighting
  [params.assets]
    favicon = "/favicon.ico"
    favicon16x16 = "/favicon-16x16.png"
    favicon32x32 = "/favicon-32x32.png"
    apple_touch_icon = "/apple-touch-icon.png"
    disableHLJS = true

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = false
    lineNumbersInTable = false

# Menu (top-right)
[[menu.main]]
  identifier = "blog"
  name = "Blog"
  url = "/blog/"
  weight = 5

[[menu.main]]
  identifier = "projects"
  name = "Projects"
  url = "/projects/"
  weight = 10

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 30

[[menu.main]]
  identifier = "cv"
  name = "CV"
  url = "/cv/"
  weight = 40
